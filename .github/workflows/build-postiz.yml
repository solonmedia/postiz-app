name: Build & Push Postiz Image (s3-support)

on:
  push:
    branches:
      - s3-support
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dev
          push: true
          tags: |
            ghcr.io/solonmedia/postiz-app:s3-support
            ghcr.io/solonmedia/postiz-app:s3-support-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
